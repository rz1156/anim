<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Cyber AI - Blink Filter Engine (Fixed)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #ff2a74;
            --secondary: #00f0ff;
            --accent: #00ff66;
            --bg-dark: #0a0a16;
            --panel-bg: rgba(15, 15, 35, 0.65);
            --neon-shadow: 0 0 15px rgba(255, 42, 116, 0.6);
            --cyber-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Cyber Anime Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(145deg, #070714 0%, #120a2a 100%);
        }

        .twilight-glow {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 42, 116, 0.15) 0%, transparent 70%);
            filter: blur(50px);
        }

        .nebula-cloud {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, transparent 70%);
            filter: blur(60px);
        }

        /* Core Glassmorphism Interface */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .neon-text {
            color: var(--primary);
            text-shadow: var(--neon-shadow);
        }

        .visualizer-area {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: none;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transform: scaleX(-1);
            transition: filter 0.3s ease-in-out;
        }

        #htmlOverlayContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* Animated HUD Notification System */
        .hud-notification {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 5, 15, 0.85);
            border: 2px solid var(--secondary);
            padding: 0.6rem 2rem;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .hud-notification.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Interactive Elements & HUD */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            gap: 1rem;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary), #ff5e97);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--neon-shadow);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 42, 116, 0.9);
        }

        .status-box {
            display: flex;
            gap: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .neon-green { color: #00ff66; text-shadow: 0 0 8px rgba(0,255,102,0.5); }
        .neon-pink { color: var(--primary); text-shadow: var(--neon-shadow); }
        .neon-blue { color: var(--secondary); text-shadow: var(--cyber-shadow); }

        .shock-lines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
            animation: jitter 0.1s infinite;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            gap: 1rem;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 240, 255, 0.1);
            border-left-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes jitter {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -1px) rotate(0.5deg); }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="twilight-glow"></div>
        <div class="nebula-cloud"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>ANIME <span class="neon-text">CYBER AI</span></h1>
            <p>Blink-Controlled Dual Tracking Interface</p>
        </header>

        <main class="visualizer-area">
            <div class="viewport-wrapper" id="viewportWrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlayCanvas"></canvas>
                <div id="htmlOverlayContainer"></div>
                <div id="hudNotification" class="hud-notification">FILTER: NORMAL VISION</div>
                
                <div class="loading-overlay" id="loadingIndicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>Mempersiapkan Core Tracking & Filter System...</p>
                </div>
            </div>

            <div class="control-panel">
                <button id="btnCamera" class="btn-primary">AKTIFKAN KAMERA</button>
                <div class="status-box">
                    <div>FPS: <span id="fpsVal" class="neon-green">0</span></div>
                    <div>EAR: <span id="earVal" class="neon-green">0.00</span></div>
                    <div>Filter: <span id="filterVal" class="neon-blue">Normal</span></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('overlayCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btnCamera = document.getElementById('btnCamera');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const filterVal = document.getElementById('filterVal');
        const fpsVal = document.getElementById('fpsVal');
        const earVal = document.getElementById('earVal');
        const viewportWrapper = document.getElementById('viewportWrapper');
        const htmlOverlayContainer = document.getElementById('htmlOverlayContainer');
        const hudNotification = document.getElementById('hudNotification');

        let faceMesh, hands, camera;
        let particles = [];
        let sakuraParticles = [];
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        // State parameters & Cooldowns
        let eyesClosedStartTime = null;
        let lastFilterSwitchTime = 0; 
        const BLINK_DURATION_THRESHOLD = 80;  // Diturunkan sedikit ke 80ms agar lebih responsif
        const COOLDOWN_DELAY = 1000;           // Anti-spam tetap 1 detik
        
        // --- DIPIKIRKAN ULANG: NILAI AMBANG EAR ---
        const EAR_THRESHOLD = 0.21;            // Dinaikkan dari 0.14 ke 0.21 (Sangat efektif untuk mata Asia/sipit)

        const FILTERS = ["NORMAL VISION", "CYBER GREEN", "THERMAL VISION", "NIGHT VISION", "MATRIX MODE"];
        let currentFilterIndex = 0;

        let currentMode = "Standard";
        let latestFaceResults = null;
        let latestHandResults = null;

        function resizeCanvas() {
            canvasElement.width = viewportWrapper.clientWidth;
            canvasElement.height = viewportWrapper.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, type, color, size, vx, vy, life) {
                this.x = x; this.y = y; this.type = type; this.color = color;
                this.size = size; this.vx = vx; this.vy = vy;
                this.maxLife = life; this.life = life;
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life--; this.angle += this.rotSpeed;
                if(this.type === 'sakura') { this.x += Math.sin(this.life * 0.02) * 0.5; }
            }
        }

        function emitGlobalSakura() {
            if (sakuraParticles.length < 35) {
                sakuraParticles.push(new Particle(
                    Math.random() * canvasElement.width, -10, 'sakura',
                    'rgba(255, 183, 197, 0.75)', Math.random() * 5 + 3,
                    (Math.random() - 0.2) * 1.5, Math.random() * 1 + 1, 300
                ));
            }
        }

        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);
        }

        function triggerHUDNotification(text) {
            hudNotification.innerText = `FILTER: ${text}`;
            hudNotification.classList.add('active');
            setTimeout(() => {
                hudNotification.classList.remove('active');
            }, 1200);
        }

        function processAndRender() {
            const now = performance.now();
            frameCount++;
            if (now - lastFrameTime >= 1000) {
                fps = frameCount; frameCount = 0; lastFrameTime = now;
                fpsVal.innerText = fps;
            }

            const W = canvasElement.width;
            const H = canvasElement.height;

            applyBaseCameraFilters(W, H);

            emitGlobalSakura();
            sakuraParticles = sakuraParticles.filter(p => p.life > 0);
            sakuraParticles.forEach(p => {
                p.update();
                canvasCtx.save();
                canvasCtx.translate(p.x, p.y);
                canvasCtx.rotate(p.angle);
                canvasCtx.fillStyle = p.color;
                canvasCtx.beginPath();
                canvasCtx.ellipse(0, 0, p.size, p.size / 2, 0, 0, Math.PI * 2);
                canvasCtx.fill();
                canvasCtx.restore();
            });

            htmlOverlayContainer.innerHTML = '';
            viewportWrapper.style.transform = 'scale(1)';
            
            applyCSSViewTransitions();

            // ==========================================
            // FACE TRACKING INTERACTION DATA EVALUATOR
            // ==========================================
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks && latestFaceResults.multiFaceLandmarks.length > 0) {
                const landmarks = latestFaceResults.multiFaceLandmarks[0];

                const leftEye = landmarks[33], rightEye = landmarks[263];
                const noseTip = landmarks[4], chin = landmarks[152], forehead = landmarks[10];

                const faceWidth = getDistance(leftEye, rightEye) * W;
                const scaleFactor = faceWidth / 110; 
                const centerPoint = { x: noseTip.x * W, y: noseTip.y * H };
                const rollAngle = Math.atan2((rightEye.y - leftEye.y) * H, (rightEye.x - leftEye.x) * W);
                
                const totalFaceHeight = getDistance(forehead, chin);
                const noseToChin = getDistance(noseTip, chin);
                const pitchRatio = noseToChin / totalFaceHeight; 

                const lipTop = landmarks[13], lipBottom = landmarks[14];
                const mouthLeft = landmarks[61], mouthRight = landmarks[291];
                const mouthOpenRatio = getDistance(lipTop, lipBottom) / getDistance(mouthLeft, mouthRight);
                const smileRatio = getDistance(mouthLeft, mouthRight) / (getDistance(landmarks[50], landmarks[280]));

                // Hitung EAR Secara Akurat Menggunakan Landmark Kelopak Mata Atas & Bawah
                const leftEAR = getDistance(landmarks[159], landmarks[145]) / getDistance(landmarks[33], landmarks[133]);
                const rightEAR = getDistance(landmarks[386], landmarks[374]) / getDistance(landmarks[263], landmarks[362]);
                const averageEAR = (leftEAR + rightEAR) / 2;
                
                // Print Real-time EAR ke HUD Status Box untuk debug
                earVal.innerText = averageEAR.toFixed(2);

                // --- ALGORITMA UTAMA SWITCH FILTER KEDIPAN ---
                if (averageEAR <= EAR_THRESHOLD) { 
                    if (!eyesClosedStartTime) {
                        eyesClosedStartTime = now;
                    }
                } else {
                    if (eyesClosedStartTime) {
                        const closedDuration = now - eyesClosedStartTime;
                        
                        if (closedDuration >= BLINK_DURATION_THRESHOLD && (now - lastFilterSwitchTime > COOLDOWN_DELAY)) {
                            currentFilterIndex = (currentFilterIndex + 1) % FILTERS.length;
                            lastFilterSwitchTime = now;
                            
                            filterVal.innerText = FILTERS[currentFilterIndex];
                            triggerHUDNotification(FILTERS[currentFilterIndex]);
                        }
                        eyesClosedStartTime = null;
                    }
                }

                // Expression Mode Calculations
                let detectedMode = "Standard";
                if (averageEAR < EAR_THRESHOLD) {
                    detectedMode = "Sleep";
                } else {
                    if (mouthOpenRatio > 0.6 && pitchRatio < 0.55) detectedMode = "Power Up";
                    else if (mouthOpenRatio > 0.4) detectedMode = "Surprise";
                    else if (pitchRatio > 0.62) detectedMode = "Embarrassed";
                    else if (smileRatio > 1.15) detectedMode = "Happy";
                }

                currentMode = detectedMode;

                // Blush Rendering Layer
                if (smileRatio > 0.85 || currentMode === "Embarrassed") {
                    let intensity = Math.min((smileRatio - 0.85) * 2.5, 0.8);
                    if (currentMode === "Embarrassed") intensity = 0.9;
                    canvasCtx.save();
                    canvasCtx.translate(centerPoint.x, centerPoint.y);
                    canvasCtx.rotate(rollAngle);
                    canvasCtx.shadowBlur = 20 * scaleFactor;
                    canvasCtx.shadowColor = `rgba(255, 60, 140, ${intensity})`;
                    canvasCtx.fillStyle = `rgba(255, 105, 180, ${intensity * 0.5})`;
                    canvasCtx.beginPath();
                    canvasCtx.arc(-35 * scaleFactor, 20 * scaleFactor, 18 * scaleFactor, 0, Math.PI * 2);
                    canvasCtx.arc(35 * scaleFactor, 20 * scaleFactor, 18 * scaleFactor, 0, Math.PI * 2);
                    canvasCtx.fill();
                    canvasCtx.restore();
                }

                // Sparkle Eye Cross Layer (Hanya muncul jika mata terbuka)
                if (averageEAR > EAR_THRESHOLD) {
                    [leftEye, rightEye].forEach(eye => {
                        canvasCtx.save();
                        canvasCtx.translate(eye.x * W, eye.y * H);
                        canvasCtx.rotate(rollAngle + (now * 0.003));
                        canvasCtx.shadowBlur = 15;
                        canvasCtx.shadowColor = "#00f0ff";
                        canvasCtx.fillStyle = "#ffffff";
                        for (let i = 0; i < 2; i++) {
                            canvasCtx.rotate(Math.PI / 4 * i);
                            canvasCtx.fillRect(-10 * scaleFactor, -2 * scaleFactor, 20 * scaleFactor, 4 * scaleFactor);
                            canvasCtx.fillRect(-2 * scaleFactor, -10 * scaleFactor, 4 * scaleFactor, 20 * scaleFactor);
                        }
                        canvasCtx.restore();
                    });
                }

                if (currentMode === "Surprise") {
                    viewportWrapper.style.transform = "scale(1.04)";
                    const lines = document.createElement('div');
                    lines.className = 'shock-lines';
                    htmlOverlayContainer.appendChild(lines);
                }
            }

            // ==========================================
            // HAND TRACKING INTERACTION LAYER
            // ==========================================
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                latestHandResults.multiHandLandmarks.forEach((handLandmarks) => {
                    canvasCtx.save();
                    canvasCtx.lineWidth = 3;
                    canvasCtx.strokeStyle = currentFilterIndex === 2 ? 'rgba(255,255,255,0.7)' : 'rgba(0, 240, 255, 0.6)';
                    canvasCtx.shadowBlur = 10;
                    canvasCtx.shadowColor = '#00f0ff';

                    const connections = [
                        [0, 1, 2, 3, 4], [0, 5, 6, 7, 8], [5, 9, 13, 17],
                        [0, 17, 18, 19, 20], [9, 10, 11, 12], [13, 14, 15, 16]
                    ];

                    connections.forEach(path => {
                        canvasCtx.beginPath();
                        path.forEach((index, i) => {
                            const pt = handLandmarks[index];
                            if (i === 0) canvasCtx.moveTo(pt.x * W, pt.y * H);
                            else canvasCtx.lineTo(pt.x * W, pt.y * H);
                        });
                        canvasCtx.stroke();
                    });

                    [4, 8, 12, 16, 20].forEach(index => {
                        const tip = handLandmarks[index];
                        canvasCtx.fillStyle = 'rgba(0, 255, 102, 0.8)';
                        canvasCtx.beginPath();
                        canvasCtx.arc(tip.x * W, tip.y * H, 5, 0, Math.PI * 2);
                        canvasCtx.fill();
                    });
                    canvasCtx.restore();
                });
            }

            requestAnimationFrame(processAndRender);
        }

        function applyBaseCameraFilters(W, H) {
            canvasCtx.drawImage(videoElement, 0, 0, W, H);
            if (currentFilterIndex === 0) return;

            let imgData = canvasCtx.getImageData(0, 0, W, H);
            let data = imgData.data;

            if (currentFilterIndex === 2) { 
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let v = (r + g + b) / 3;
                    data[i]   = v > 128 ? 255 : v * 2;
                    data[i+1] = v > 64 && v < 192 ? 200 : (v > 192 ? v : 0);
                    data[i+2] = v < 128 ? 255 - (v * 2) : 0;
                }
                canvasCtx.putImageData(imgData, 0, 0);
            } 
            else if (currentFilterIndex === 4) { 
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                    data[i] = lum * 0.1;
                    data[i+1] = lum * 1.4;
                    data[i+2] = lum * 0.1;
                }
                canvasCtx.putImageData(imgData, 0, 0);

                if (Math.random() < 0.15) {
                    let sliceY = Math.random() * H;
                    let sliceH = Math.random() * 25 + 5;
                    canvasCtx.drawImage(canvasElement, 0, sliceY, W, sliceH, (Math.random() - 0.5) * 12, sliceY, W, sliceH);
                }
            }
        }

        function applyCSSViewTransitions() {
            switch(currentFilterIndex) {
                case 1:
                    canvasElement.style.filter = "contrast(1.2) brightness(0.9) hue-rotate(40deg) sepia(0.6) saturate(1.8)";
                    canvasCtx.save();
                    canvasCtx.strokeStyle = 'rgba(0, 255, 102, 0.25)';
                    canvasCtx.lineWidth = 1;
                    for (let y = 0; y < canvasElement.height; y += 4) {
                        canvasCtx.beginPath(); canvasCtx.moveTo(0, y); canvasCtx.lineTo(canvasElement.width, y); canvasCtx.stroke();
                    }
                    canvasCtx.strokeStyle = 'rgba(0, 255, 102, 0.4)';
                    canvasCtx.beginPath(); canvasCtx.arc(canvasElement.width/2, canvasElement.height/2, 60, 0, Math.PI*2); canvasCtx.stroke();
                    canvasCtx.restore();
                    break;
                case 2:
                    canvasElement.style.filter = "contrast(1.6) saturate(2.5)";
                    break;
                case 3:
                    canvasElement.style.filter = "brightness(1.5) contrast(1.1) sepia(1) hue-rotate(85deg) saturate(1.5)";
                    canvasCtx.save();
                    canvasCtx.fillStyle = "rgba(0, 255, 0, 0.05)";
                    for (let k = 0; k < 12; k++) {
                        canvasCtx.fillRect(Math.random() * canvasElement.width, Math.random() * canvasElement.height, 3, 3);
                    }
                    canvasCtx.restore();
                    break;
                case 4:
                    canvasElement.style.filter = "contrast(1.5) brightness(0.85)";
                    break;
                default:
                    canvasElement.style.filter = "none";
                    break;
            }
        }

        function initAIModel() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            faceMesh.onResults((res) => { latestFaceResults = res; });

            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults((res) => { latestHandResults = res; });

            loadingIndicator.style.opacity = '0';
            setTimeout(() => { loadingIndicator.style.display = 'none'; }, 500);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: "user" },
                    audio: false
                });
                videoElement.srcObject = stream;
                
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await Promise.all([
                            faceMesh.send({ image: videoElement }),
                            hands.send({ image: videoElement })
                        ]);
                    },
                    width: 640,
                    height: 480
                });
                
                camera.start();
                btnCamera.style.display = 'none';
                resizeCanvas();
                requestAnimationFrame(processAndRender);
            } catch (err) {
                alert("Gagal mengakses hardware kamera: " + err.message);
                loadingIndicator.style.display = 'none';
            }
        }

        btnCamera.addEventListener('click', () => {
            loadingIndicator.style.display = 'flex';
            initAIModel();
            startCamera();
        });
    </script>
</body>
</html>
